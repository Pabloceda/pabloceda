<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <style>
    .title { font: bold 38px 'Segoe UI', system-ui, sans-serif; fill: #ffffff; }
    .subtitle { font: 18px 'Segoe UI', system-ui, sans-serif; fill: #8b949e; }
    .accent { fill: #10b981; } /* Verde esmeralda estilo terminal/seguridad */
    .grid { stroke: #ffffff; stroke-width: 1; opacity: 0.05; }
    
    /* Animación del escáner */
    .scan-line { 
      stroke: #10b981; 
      stroke-width: 1.5; 
      opacity: 0.6; 
      animation: scan 5s linear infinite; 
    }
    
    /* Animación del cursor de la terminal */
    .cursor { animation: blink 1s step-end infinite; }
    
    /* Animación de los nodos */
    .node { animation: pulse 3s ease-in-out infinite; }

    @keyframes scan {
      0% { transform: translateY(-10px); opacity: 0; }
      5% { opacity: 0.6; }
      95% { opacity: 0.6; }
      100% { transform: translateY(210px); opacity: 0; }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; r: 3; }
      50% { opacity: 1; r: 5; }
    }
  </style>

  <!-- Fondo oscuro elegante -->
  <rect width="100%" height="100%" fill="#0d1117" rx="10"/>

  <!-- Patrón de cuadrícula de fondo -->
  <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#gridPattern)" rx="10"/>

  <!-- Línea de escáner animada -->
  <line x1="0" y1="0" x2="800" y2="0" class="scan-line" />

  <!-- Texto Principal -->
  <text x="50" y="90" class="title">Pablo Calderón de Alba<tspan class="accent cursor">_</tspan></text>
  <text x="50" y="135" class="subtitle">Administración de Sistemas • Redes • Ciberseguridad</text>
  
  <!-- Nodos decorativos a la derecha -->
  <g transform="translate(680, 0)">
    <circle cx="20" cy="75" r="4" fill="#10b981" class="node" style="animation-delay: 0s;" />
    <circle cx="60" cy="115" r="4" fill="#3b82f6" class="node" style="animation-delay: 1s;" />
    <circle cx="0" cy="130" r="4" fill="#8b949e" class="node" style="animation-delay: 2s;" />
    
    <!-- Líneas conectando los nodos -->
    <path d="M20 75 L60 115 L0 130 Z" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.1" />
  </g>
</svg>
